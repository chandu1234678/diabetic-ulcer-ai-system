version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diabetic_ulcer_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/diabetic_ulcer_db
      - SECRET_KEY=dev-secret-key-change-in-production
      - APP_ENV=development
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    networks:
      - diabetic_ulcer_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diabetic_ulcer_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - diabetic_ulcer_network

  db:
    image: postgres:15-alpine
    container_name: diabetic_ulcer_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=diabetic_ulcer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - diabetic_ulcer_network

  redis:
    image: redis:7-alpine
    container_name: diabetic_ulcer_redis
    ports:
      - "6379:6379"
    networks:
      - diabetic_ulcer_network

  prometheus:
    image: prom/prometheus:latest
    container_name: diabetic_ulcer_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - diabetic_ulcer_network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: diabetic_ulcer_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
      - grafana_data:/var/lib/grafana
    networks:
      - diabetic_ulcer_network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  diabetic_ulcer_network:
    driver: bridge
