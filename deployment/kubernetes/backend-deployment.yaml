apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: diabetic-ulcer-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: diabetic-ulcer-backend
  template:
    metadata:
      labels:
        app: diabetic-ulcer-backend
    spec:
      containers:
      - name: backend
        image: diabetic-ulcer-ai:backend-latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: secret-key
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: model-weights
          mountPath: /app/model_weights
      volumes:
      - name: model-weights
        persistentVolumeClaim:
          claimName: model-weights-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: diabetic-ulcer-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
